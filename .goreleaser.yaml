version: 2

project_name: funlang

before:
  hooks:
    - go mod tidy

builds:
  # Linux amd64/arm64 и Windows amd64
  - id: build-with-upx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./main.go
    binary: fun
    flags:
      - -trimpath
    ldflags:
      - -s -w
    hooks:
      post:
        - upx --best --lzma "{{ .Path }}"

  # macOS и Windows ARM64
  - id: build-without-upx
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: amd64
    main: ./main.go
    binary: fun
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'ci:'
      - 'dev:'
